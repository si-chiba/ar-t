<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>チーバくん AR - 完全版</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <style>
        body { margin: 0; overflow: hidden; font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #000; }

        /* スタート画面：全面を覆う */
        #start-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #4c97ff, #3373cc);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999;
            color: white; text-align: center; padding: 20px; box-sizing: border-box;
        }

        .start-button {
            background-color: #ffab19; color: white; border: none;
            padding: 20px 50px; font-size: 24px; font-weight: bold;
            border-radius: 50px; cursor: pointer; box-shadow: 0 6px 0 #cf8b12;
            transition: transform 0.1s;
        }
        .start-button:active { transform: translateY(4px); box-shadow: 0 2px 0 #cf8b12; }

        /* UIレイヤー */
        #ui-layer {
            position: fixed; top: 40px; left: 0; width: 100%;
            z-index: 1000; text-align: center; pointer-events: none;
            display: none; transition: opacity 0.5s;
        }

        .guide-text {
            display: inline-block; background: rgba(0,0,0,0.7); color: white;
            padding: 15px 30px; border-radius: 50px; font-size: 16px;
        }

        .hide { opacity: 0 !important; }

        /* ARシーンのコンテナ（最初は隠しておく） */
        #ar-scene-container { visibility: hidden; }
    </style>
</head>

<body>

    <div id="start-screen">
        <h1 style="font-size: 28px; margin-bottom: 10px;">チーバくんと写真をとろう！</h1>
        <p style="font-size: 16px; margin-bottom: 30px; opacity: 0.9;">
            「スタート！」を押すとカメラが起動します。<br>
            ブラウザの「許可」ボタンを押してね！
        </p>
        <button class="start-button" onclick="startAR()">スタート！</button>
    </div>

    <div id="ui-layer">
        <div class="guide-text">📸 スクリーンショットで撮影してね！</div>
    </div>

    <div id="ar-scene-container">
        <a-scene embedded 
                 arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;" 
                 vr-mode-ui="enabled: false">
            
            <a-assets>
                <img id="my-image" src="chiba-kun.png">
            </a-assets>

            <a-marker id="target-marker" type="pattern" url="pattern-marker.patt">
                <a-image 
                    src="#my-image" 
                    width="1" height="1.48"
                    rotation="-90 0 0" 
                    position="0 0.2 0" 
                    scale="5 5 5"
                    material="transparent: true; alphaTest: 0.5; side: double;">
                </a-image>
            </a-marker>

            <a-entity camera></a-entity>
        </a-scene>
    </div>

    <script>
        function startAR() {
            // 1. スタート画面を削除
            const startScreen = document.getElementById('start-screen');
            startScreen.style.display = 'none';

            // 2. ARシーンを表示
            const container = document.getElementById('ar-scene-container');
            container.style.visibility = 'visible';

            // 3. iOS/Androidでの描画バグを防ぐため、リサイズイベントを発火させる
            window.dispatchEvent(new Event('resize'));

            const marker = document.getElementById('target-marker');
            const uiLayer = document.getElementById('ui-layer');

            // マーカー検知時の処理
            marker.addEventListener('markerFound', () => {
                uiLayer.style.display = 'block';
                uiLayer.classList.remove('hide');

                // 4秒後に案内を消す
                setTimeout(() => {
                    uiLayer.classList.add('hide');
                }, 4000);
            });
        }

        // 画面タップでメッセージ再表示
        window.addEventListener('click', () => {
            const uiLayer = document.getElementById('ui-layer');
            if (uiLayer.style.display === 'block') {
                uiLayer.classList.remove('hide');
                setTimeout(() => {
                    uiLayer.classList.add('hide');
                }, 3000);
            }
        });
    </script>
</body>
</html>
