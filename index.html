<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>スクラッチで遊ぼう！ AR</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <style>
        body { margin: 0; overflow: hidden; font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif; background-color: #000; }

        /* --- スタート画面のスタイル --- */
        #start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #4c97ff, #3373cc); /* スクラッチ風の青色 */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            color: white;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 { font-size: 28px; margin-bottom: 10px; }
        p { font-size: 16px; line-height: 1.6; margin-bottom: 30px; }

        .start-button {
            background-color: #ffab19; /* スクラッチ風のオレンジ */
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 0 #cf8b12;
            transition: transform 0.1s;
        }

        .start-button:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        /* --- 撮影案内（既存） --- */
        #ui-layer {
            position: fixed;
            top: 30px;
            left: 0;
            width: 100%;
            z-index: 1000;
            text-align: center;
            pointer-events: none;
            transition: opacity 0.5s ease;
            display: none; /* 最初は非表示 */
        }

        .guide-text {
            display: inline-block;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 14px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        #tap-area {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 999;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            display: none; /* 最初は非表示 */
        }

        .hide { opacity: 0 !important; }
    </style>
</head>

<body>
    <div id="start-screen">
        <h1>チーバくんと写真を撮ろう！</h1>
        <p>これからカメラが起動します。<br>
           ブラウザから許可を求められたら<br>
           <strong>「許可」</strong>を押してくださいね！</p>
        <button class="start-button" onclick="initAR()">スタート！</button>
    </div>

    <div id="ui-layer">
        <div class="guide-text">撮影はスクリーンショットでお願いします</div>
    </div>

    <div id="tap-area"></div>

    <a-scene 
        embedded 
        arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; smooth: true; smoothCount: 10; smoothTolerance: 0.01; smoothThreshold: 5;" 
        vr-mode-ui="enabled: false">
        
        <a-assets>
            <img id="my-image" src="chiba-kun.png">
        </a-assets>

        <a-marker type="pattern" url="marker-patten.png">
            <a-image 
                src="#my-image" 
                width="1"
                height="1.48"
                rotation="-90 0 0" 
                position="1.2 0.2 0.5" 
                scale="8 8 8"
                material="transparent: true; alphaTest: 0.5; side: double;">
            </a-image>
        </a-marker>
        
        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const startScreen = document.getElementById('start-screen');
        const uiLayer = document.getElementById('ui-layer');
        const tapArea = document.getElementById('tap-area');
        let hideTimeout;

        function startHideTimer() {
            clearTimeout(hideTimeout);
            hideTimeout = setTimeout(() => {
                uiLayer.classList.add('hide');
            }, 3000); // 案内の表示時間を少し長め（3秒）に設定
        }

        // スタートボタンを押した時の処理
        function initAR() {
            // スタート画面を消す
            startScreen.style.display = 'none';
            
            // 案内レイヤーを表示
            uiLayer.style.display = 'block';
            tapArea.style.display = 'block';
            
            // 案内タイマー開始
            startHideTimer();
        }

        // 画面タップ時の処理
        tapArea.addEventListener('click', () => {
            uiLayer.classList.remove('hide');
            startHideTimer();
        });
    </script>
</body>
</html>
